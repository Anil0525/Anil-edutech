<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anil EduTech</title>
<script>
var path = window.location.pathname;

// These paths have real static folders — add trailing slash so GitHub Pages serves them
var staticPaths = ['/exams', '/mock-tests', '/syllabus', '/videos', '/jobs', '/current-affairs', '/daily-challenge', '/progress', '/support'];

if (staticPaths.indexOf(path) !== -1) {
  // Redirect to folder with trailing slash → GitHub Pages serves index.html
  window.location.replace(path + '/');
} else {
  // Unknown path → go to main app
  var pageMap = {
    '/mock-tests': 'mock-folders',
    '/current-affairs': 'current-affairs',
    '/syllabus': 'syllabus',
    '/videos': 'videos',
    '/jobs': 'jobs',
    '/daily-challenge': 'daily',
    '/progress': 'progress',
    '/support': 'support',
    '/referral': 'referral',
    '/badges': 'badges',
    '/profile': 'profile',
    '/contest': 'contest',
  };
  var targetPage = pageMap[path];
  if (targetPage) sessionStorage.setItem('ae_goto_page', targetPage);
  window.location.replace('/');
}
</script>
</head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:100px;color:#666;">Loading Anil EduTech...</p>
</body>
</html>
