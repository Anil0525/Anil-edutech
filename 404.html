<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anil EduTech</title>
<script>
// Save target page in sessionStorage, then redirect cleanly to /
var path = window.location.pathname;
var pageMap = {
  '/exams':           'exams',
  '/mock-tests':      'mock-folders',
  '/current-affairs': 'current-affairs',
  '/syllabus':        'syllabus',
  '/videos':          'videos',
  '/jobs':            'jobs',
  '/daily-challenge': 'daily',
  '/progress':        'progress',
  '/support':         'support',
  '/referral':        'referral',
  '/badges':          'badges',
  '/profile':         'profile',
  '/contest':         'contest',
};
var targetPage = pageMap[path];
if (targetPage) {
  sessionStorage.setItem('ae_goto_page', targetPage);
}
// Redirect to homepage cleanly (no ?p= params)
window.location.replace('/');
</script>
</head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:100px;color:#666;">Loading Anil EduTech...</p>
</body>
</html>
