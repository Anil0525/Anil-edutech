<!--
  ════════════════════════════════════════════════════════════════
  📖 EBOOKS ADMIN TAB — admin-content.html లో paste చేయండి
  ════════════════════════════════════════════════════════════════

  STEP 1: Admin tabs bar లో button add చేయండి
  (other tab buttons తర్వాత — "categories" tab దగ్గర)
-->

<!-- ── EBOOKS TAB BUTTON (tabs bar లో add చేయండి) ── -->
<button class="admin-tab" onclick="switchAdminTab('ebooks', this)">📖 eBooks</button>


<!--
  ════════════════════════════════════════════════════════════════
  STEP 2: Tab panels section లో (other atab-* divs తర్వాత) add చేయండి
  ════════════════════════════════════════════════════════════════
-->

<!-- ── EBOOKS TAB PANEL ── -->
<div id="atab-ebooks" class="admin-panel">
  <div class="admin-card">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
      <div>
        <h2 style="font-size:17px;font-weight:900;color:var(--text);margin:0 0 4px;">📖 eBooks Manager</h2>
        <p style="font-size:12.5px;color:var(--text3);margin:0;">PDF eBooks upload చేయండి — users read-only గా చదువుతారు (download కాదు)</p>
      </div>
    </div>

    <!-- ── ADD EBOOK FORM ── -->
    <div style="background:var(--bg2,var(--bg));border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:24px;">
      <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px;">➕ New eBook Add చేయండి</div>

      <!-- Title -->
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;">📝 Title *</label>
        <input id="ebook-admin-title" type="text" placeholder="eBook title enter చేయండి..."
          style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-weight:600;background:var(--bg);color:var(--text);font-family:inherit;box-sizing:border-box;">
      </div>

      <!-- Subject -->
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;">📚 Subject / Category</label>
        <select id="ebook-admin-sub"
          style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-weight:600;background:var(--bg);color:var(--text);font-family:inherit;box-sizing:border-box;">
          <option value="">-- Subject select చేయండి --</option>
          <option value="Telugu History">📜 Telugu History</option>
          <option value="Indian History">🇮🇳 Indian History</option>
          <option value="Geography">🗺️ Geography</option>
          <option value="Polity">⚖️ Polity</option>
          <option value="Economy">💹 Economy</option>
          <option value="Science">🔬 Science</option>
          <option value="Environment">🌿 Environment</option>
          <option value="Mathematics">🧮 Mathematics</option>
          <option value="General Knowledge">📰 General Knowledge</option>
          <option value="Current Affairs">🗞️ Current Affairs</option>
          <option value="English">🔤 English</option>
          <option value="Reasoning">🧠 Reasoning</option>
          <option value="Computer">💻 Computer</option>
          <option value="Other">📁 Other</option>
        </select>
      </div>

      <!-- Description -->
      <div style="margin-bottom:16px;">
        <label style="font-size:12px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;">📄 Description (optional)</label>
        <textarea id="ebook-admin-desc" placeholder="Brief description..." rows="2"
          style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;background:var(--bg);color:var(--text);font-family:inherit;box-sizing:border-box;resize:vertical;"></textarea>
      </div>

      <!-- PDF Upload Drop Zone -->
      <div style="margin-bottom:14px;">
        <label style="font-size:12px;font-weight:700;color:var(--text3);display:block;margin-bottom:8px;">📁 PDF File * (max 200 MB)</label>

        <!-- Drop Zone -->
        <div id="ebook-admin-dropzone"
          onclick="document.getElementById('ebook-admin-file-input').click()"
          ondrop="_onEbookAdminDrop(event)" ondragover="event.preventDefault();this.style.borderColor='var(--primary)'" ondragleave="this.style.borderColor='var(--border)'"
          style="border:2px dashed var(--border);border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);">
          <div style="font-size:32px;margin-bottom:8px;">📄</div>
          <div style="font-size:13px;font-weight:700;color:var(--text2);">PDF drag & drop చేయండి</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;">లేదా click చేసి file select చేయండి</div>
          <div style="font-size:11px;color:var(--text3);margin-top:6px;">PDF only · Max 200 MB</div>
        </div>
        <input id="ebook-admin-file-input" type="file" accept=".pdf,application/pdf" style="display:none;"
          onchange="_onEbookFileSelect(this.files[0])">

        <!-- File Preview -->
        <div id="ebook-admin-file-preview" style="display:none;margin-top:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);align-items:center;gap:12px;">
          <span style="font-size:24px;">📄</span>
          <div style="flex:1;min-width:0;">
            <div id="ebook-admin-filename" style="font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            <div id="ebook-admin-filesize" style="font-size:11.5px;color:var(--text3);margin-top:2px;font-weight:600;"></div>
          </div>
          <button onclick="_clearEbookAdminFile()"
            style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--red);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;">✕ Remove</button>
        </div>
      </div>

      <!-- Progress Bar -->
      <div id="ebook-admin-progress" style="display:none;margin-bottom:14px;">
        <div style="height:8px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px;">
          <div id="ebook-admin-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#1B2D5E,#2563EB);border-radius:10px;transition:width .3s;"></div>
        </div>
        <div id="ebook-admin-pct" style="font-size:12px;font-weight:700;color:var(--text3);text-align:center;">0% uploaded...</div>
      </div>

      <!-- Submit -->
      <button onclick="addEbookAdmin()"
        style="width:100%;padding:12px;background:linear-gradient(135deg,#1B2D5E,#2563EB);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">
        📤 eBook Upload & Save
      </button>

      <!-- Status -->
      <div id="ebook-admin-status" style="display:none;margin-top:10px;font-size:13px;font-weight:700;text-align:center;padding:8px;border-radius:8px;background:var(--bg2,var(--bg));"></div>
    </div>

    <!-- ── EXISTING EBOOKS LIST ── -->
    <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;">📚 Uploaded eBooks</div>
    <div id="ebook-admin-list">
      <div style="text-align:center;padding:30px;color:var(--text3);font-size:13px;font-weight:600;">⏳ Loading...</div>
    </div>

  </div>
</div>

<!--
  ════════════════════════════════════════════════════════════════
  STEP 3: admin-content.html లో existing <script> tag లో (లేదా closing </script> ముందు) add చేయండి:
  ════════════════════════════════════════════════════════════════
-->
<script>
// Drop handler for ebook admin dropzone
function _onEbookAdminDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('ebook-admin-dropzone');
  if (dz) dz.style.borderColor = 'var(--border)';
  const f = e.dataTransfer.files[0];
  if (f) _onEbookFileSelect(f);
}
</script>
